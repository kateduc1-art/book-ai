version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: book_ai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookai
      POSTGRES_PASSWORD: bookai
      POSTGRES_DB: book_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookai -d book_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: book_ai_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://bookai:bookai@db:5432/book_ai
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/storage/uploads
      - exports:/app/storage/exports

volumes:
  pgdata:
  uploads:
  exports:
